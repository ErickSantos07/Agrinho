<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazendinha 1D - Projeto Agrinho</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <h1>🌾 Fazendinha 1D 🚜</h1>
        <p class="instructions">Use as setas <strong>⬅️ Esquerda</strong> e <strong>Direita ➡️</strong> para se mover. Regue e colha as plantas!</p>
        
        <div class="scoreboard">
            <div>Pontos: <span id="score">0</span></div>
            <div>Água: <span id="water">5</span>/5</div>
        </div>

        <div class="world-1d" id="world">
            </div>

        <div class="controls-info">
            <p>💧 Fique em cima do **Poço (P)** para recarregar a água.</p>
            <p>🌱 Fique em cima da planta para cuidar dela automaticamente.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
