<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Linha Agrícola - Projeto Agrinho</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <h1>Super Linha Agrícola 🚜</h1>
        <p class="instructions">Use as setas <strong>Esquerda (◀)</strong> e <strong>Direita (▶)</strong> para mover o trator. Colha as plantas maduras e leve ao Silo. Cuidado com as lagartas!</p>
        
        <div class="scoreboard">
            <div>Pontos: <span id="score">0</span></div>
            <div>Carga: <span id="cargo">0</span>/3</div>
        </div>

        <div class="game-track" id="gameTrack">
            <div class="silo" style="left: 0px;">🏢 Silo</div>
            </div>

        <div class="controls-hint">Dica: Plantas piscam em verde quando estão prontas para colher!</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
