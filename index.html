<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazenda 1D - Gerenciamento Avançado</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>🚜 Fazenda 1D: Edição Avançada</h1>
        <p class="description">Clique nas ações abaixo para selecionar sua ferramenta e depois <strong>clique direto no terreno</strong> desejado!</p>
        
        <div class="status-panel">
            <div class="status-item">💰 Moedas: <span id="coins">20</span></div>
            <div class="status-item">🌾 Sementes: <span id="seeds">5</span></div>
        </div>

        <div class="tool-selector">
            <button id="tool-plant" class="tool-btn active">🌱 Plantar</button>
            <button id="tool-water" class="tool-btn">💧 Regar</button>
            <button id="tool-bio" class="tool-btn-special">🧪 Biofertilizante ($5)</button>
            <button id="tool-herb" class="tool-btn-special">⚠️ Herbicida ($3)</button>
            <button id="tool-harvest" class="tool-btn">🧺 Colher</button>
        </div>

        <div class="world-1d" id="farm-line"></div>

        <div class="shop-panel">
            <h3>Mercado de Insumos</h3>
            <button id="btn-buy-seed">Comprar Semente (Custo: 2 💰)</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
